    // ── Seed Function ──
    async function seedAll() {
      const btn = document.getElementById('btnSeed');
      btn.disabled = true;
      logEl.innerHTML = '';

      try {
        // Auth
        log('Melde an als Admin...', 'info');
        try {
          await auth.signInWithEmailAndPassword('admin@vanavil.ch', prompt('Admin-Passwort eingeben:'));
          log('Angemeldet als ' + auth.currentUser.email, 'success');
        } catch (e) {
          log('Login fehlgeschlagen: ' + e.message, 'error');
          btn.disabled = false;
          return;
        }

        // News
        log('\n── News einfügen ──', 'info');
        for (const item of sampleNews) {
          const ref = await db.collection('news').add(item);
          log('  + ' + item.title.substring(0, 50) + '...  [' + ref.id + ']', 'success');
        }

        // Matches
        log('\n── Spiele einfügen ──', 'info');
        for (const item of sampleMatches) {
          const ref = await db.collection('matches').add(item);
          log('  + ' + item.homeTeam + ' vs ' + item.awayTeam + '  [' + ref.id + ']', 'success');
        }

        // Tournaments
        log('\n── Turniere einfügen ──', 'info');
        for (const item of sampleTournaments) {
          const ref = await db.collection('tournaments').add(item);
          log('  + ' + item.name + '  [' + ref.id + ']', 'success');
        }

        // Players
        log('\n── Spieler einfügen (Erste Mannschaft) ──', 'info');
        const seniorIds = [];
        for (const item of samplePlayers) {
          item.createdAt = new Date().toISOString();
          const ref = await db.collection('players').add(item);
          seniorIds.push(ref.id);
          log('  + #' + item.number + ' ' + item.name + ' (' + item.position + ')  [' + ref.id + ']', 'success');
        }

        log('\n── Spieler einfügen (Junioren) ──', 'info');
        const juniorIds = [];
        for (const item of sampleJuniors) {
          item.createdAt = new Date().toISOString();
          const ref = await db.collection('players').add(item);
          juniorIds.push(ref.id);
          log('  + #' + item.number + ' ' + item.name + ' (' + item.position + ')  [' + ref.id + ']', 'success');
        }

        // Roster
        log('\n── Kader zuweisen ──', 'info');
        await db.collection('roster').doc('erste-mannschaft').set({
          playerIds: seniorIds,
          updatedAt: new Date().toISOString()
        });
        log('  + Erste Mannschaft: ' + seniorIds.length + ' Spieler', 'success');

        await db.collection('roster').doc('junioren').set({
          playerIds: juniorIds,
          updatedAt: new Date().toISOString()
        });
        log('  + Junioren: ' + juniorIds.length + ' Spieler', 'success');

        await db.collection('roster').doc('academy').set({
          playerIds: [],
          updatedAt: new Date().toISOString()
        });
        log('  + Academy: 0 Spieler (leer)', 'success');

        // Gallery (placeholder entries without images)
        log('\n── Galerie-Einträge einfügen ──', 'info');
        const galleryItems = [

          { title: "STFA Pokal 2025", description: "Highlights vom letztjährigen Pokalturnier" }
        ];
        for (const item of galleryItems) {
          item.imageURL = "";
          item.storagePath = "";
          item.createdAt = new Date(Date.now() - galleryItems.indexOf(item) * 86400000 * 7).toISOString();
          const ref = await db.collection('gallery').add(item);
          log('  + ' + item.title + '  [' + ref.id + ']', 'success');

        log('\n════════════════════════════════════', 'success');
        log('FERTIG! Alle Testdaten wurden eingefügt.', 'success');

        log('FEHLER: ' + e.message, 'error');

    // ── Delete Function ──
    async function deleteAll() {
      if (!confirm('Wirklich ALLE Testdaten löschen? Das betrifft ALLE Einträge in allen Collections!')) return;

      const btn = document.getElementById('btnDelete');
      btn.disabled = true;
      logEl.innerHTML = '';

      try {
        // Auth
        log('Melde an als Admin...', 'info');
        try {
          await auth.signInWithEmailAndPassword('admin@vanavil.ch', prompt('Admin-Passwort eingeben:'));
          log('Angemeldet als ' + auth.currentUser.email, 'success');
        } catch (e) {
          log('Login fehlgeschlagen: ' + e.message, 'error');
          btn.disabled = false;
          return;
        }

        const collections = ['news', 'matches', 'tournaments', 'players', 'gallery'];

        for (const col of collections) {
          log('\n── ' + col + ' löschen ──', 'info');
          const snap = await db.collection(col).get();
          let count = 0;
          for (const doc of snap.docs) {
            await doc.ref.delete();
            count++;
          }
          log('  ' + count + ' Dokumente gelöscht', 'warn');
        }

        // Roster docs
        log('\n── Kader löschen ──', 'info');
        const rosterDocs = ['erste-mannschaft', 'junioren', 'academy'];
        for (const docId of rosterDocs) {
          try {
            await db.collection('roster').doc(docId).delete();
            log('  ' + docId + ' gelöscht', 'warn');
          } catch (e) {
            log('  ' + docId + ' nicht gefunden (OK)', 'info');
          }
        }

        log('\n════════════════════════════════════', 'warn');
        log('FERTIG! Alle Daten wurden gelöscht.', 'warn');
        log('════════════════════════════════════', 'warn');

      } catch (e) {
        log('FEHLER: ' + e.message, 'error');
        console.error(e);
      }

      btn.disabled = false;
    }
